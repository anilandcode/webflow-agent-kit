name: Setup Node.js and pnpm
description: Sets up Node.js and activates pnpm 9.15.4 via Corepack

inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '22'

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Enable Corepack + activate pnpm
      shell: bash
      run: |
        set -ex
        echo "=== System Diagnostic ==="
        which node || true
        node --version

        echo "=== Corepack Setup ==="
        corepack enable
        corepack prepare pnpm@9.15.4 --activate

        echo "=== Verify pnpm ==="
        which pnpm
        pnpm --version
        echo "Expected: 9.15.4"

    - name: Configure pnpm store
      shell: bash
      run: |
        pnpm config set store-dir ~/.pnpm-store
        echo "pnpm store-dir: $(pnpm config get store-dir)"
