name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  changed-files:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'webflow-agent-kit-python/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/security.yml'
            docs:
              - 'docs/**'
              - 'docs-site/**'
              - 'README.md'
              - 'CONTRIBUTING.md'
              - 'skill-packs/**'
              - '.github/workflows/ci.yml'

  quality:
    name: TS Quality (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ matrix.node }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm test

  package-smoke:
    name: Package Smoke
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run package smoke tests
        run: node scripts/package-smoke.mjs

  mcp-smoke:
    name: MCP Protocol Smoke
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run MCP protocol smoke test
        run: node packages/mcp/scripts/smoke-test.mjs

  python-quality:
    name: Python Quality
    runs-on: ubuntu-latest
    needs: changed-files
    if: |
      always() &&
      (
        github.event_name == 'push' && github.ref == 'refs/heads/main' ||
        github.event_name == 'workflow_dispatch' ||
        needs.changed-files.outputs.python == 'true'
      )
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Python deps
        run: |
          cd webflow-agent-kit-python
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: ruff check
        run: cd webflow-agent-kit-python && ruff check .
      - name: mypy
        run: cd webflow-agent-kit-python && mypy webflow_agent_kit
      - name: pytest
        run: cd webflow-agent-kit-python && pytest
      - name: build
        run: cd webflow-agent-kit-python && python -m build
      - name: twine check
        run: cd webflow-agent-kit-python && python -m twine check dist/*

  docs:
    name: Docs Build
    runs-on: ubuntu-latest
    needs: changed-files
    if: |
      always() &&
      (
        github.event_name == 'push' && github.ref == 'refs/heads/main' ||
        github.event_name == 'workflow_dispatch' ||
        needs.changed-files.outputs.docs == 'true'
      )
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build docs-site
        run: |
          cd docs-site
          pnpm install --frozen-lockfile
          pnpm build
