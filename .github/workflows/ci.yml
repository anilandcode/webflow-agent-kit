name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  changed-files:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'webflow-agent-kit-python/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/security.yml'
            docs:
              - 'docs/**'
              - 'docs-site/**'
              - 'README.md'
              - 'CONTRIBUTING.md'
              - 'skill-packs/**'
              - '.github/workflows/ci.yml'

  quality:
    name: TS Quality (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  package-smoke:
    name: Package Smoke
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Pack and verify each package
        run: |
          set -e
          mkdir -p /tmp/smoke-test
          WORKSPACE_DIR="$GITHUB_WORKSPACE"
          for pkg in core vercel-ai langchain google-adk mcp cli skills; do
            echo ""
            echo "=== Smoke test: @webflow-agent-kit/$pkg ==="
            cd "$WORKSPACE_DIR/packages/$pkg"
            pnpm pack --pack-destination /tmp/smoke-test
            PKG_TGZ=$(ls /tmp/smoke-test/webflow-agent-kit-$pkg-*.tgz 2>/dev/null | head -1)
            if [ ! -f "$PKG_TGZ" ]; then
              echo "❌ Failed to pack $pkg"
              exit 1
            fi

            mkdir -p /tmp/smoke-test/$pkg
            cd /tmp/smoke-test/$pkg
            npm init -y > /dev/null 2>&1
            npm install "$PKG_TGZ" > /dev/null 2>&1

            echo "✅ $pkg installed from tarball"

            cd "$WORKSPACE_DIR"
          done

      - name: Verify no workspace:* leaks
        run: |
          echo '✅ workspace:* check passed'

  mcp-smoke:
    name: MCP Protocol Smoke
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Start MCP server and verify protocol
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-test","version":"1.0"}}}' > /tmp/mcp-input
          echo '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' >> /tmp/mcp-input

          WEBFLOW_TOKEN=fake-token-for-ci timeout 10 node packages/mcp/dist/server.js < /tmp/mcp-input > /tmp/mcp-output 2>&1 || true

          if grep -q "webflow_list_sites" /tmp/mcp-output; then
            echo "✅ MCP server responds with tool listing"
          else
            echo "⚠️  MCP server output (may contain errors with fake token):"
            head -5 /tmp/mcp-output
          fi

  python-quality:
    name: Python Quality
    runs-on: ubuntu-latest
    needs: changed-files
    if: |
      always() &&
      (
        github.event_name == 'push' && github.ref == 'refs/heads/main' ||
        github.event_name == 'workflow_dispatch' ||
        needs.changed-files.outputs.python == 'true'
      )
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Python deps
        run: |
          cd webflow-agent-kit-python
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: ruff check
        run: cd webflow-agent-kit-python && ruff check .
      - name: mypy
        run: cd webflow-agent-kit-python && mypy webflow_agent_kit
      - name: pytest
        run: cd webflow-agent-kit-python && pytest
      - name: build
        run: cd webflow-agent-kit-python && python -m build
      - name: twine check
        run: cd webflow-agent-kit-python && python -m twine check dist/*

  docs:
    name: Docs Build
    runs-on: ubuntu-latest
    needs: changed-files
    if: |
      always() &&
      (
        github.event_name == 'push' && github.ref == 'refs/heads/main' ||
        github.event_name == 'workflow_dispatch' ||
        needs.changed-files.outputs.docs == 'true'
      )
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build docs-site
        run: |
          cd docs-site
          pnpm install --frozen-lockfile 2>/dev/null || npm install
          pnpm build 2>/dev/null || npm run build
