name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  smoke-gate:
    name: Smoke Gate
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Package smoke
        run: node scripts/package-smoke.mjs
      - name: MCP smoke
        run: node packages/mcp/scripts/smoke-test.mjs

  release:
    name: Release
    needs: smoke-gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: changesets/action@v1
        with:
          publish: pnpm release
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
